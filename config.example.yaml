# GitLab Pipeline Status — Configuration
# Copy this file to config.yaml and fill in your details

# Polling interval in seconds (how often to check pipeline status)
refreshInterval: 30

# Projects to exclude (optional, case-insensitive partial match)
excludeProjects:
  - "general"
  - "dockerconfig"
  # - "group/unwanted-project"

# GitLab servers
servers:
  # Single token (legacy format, still supported)
  - name: "GitLab Main"
    url: "https://gitlab.com"
    token: "glpat-xxxxxxxxxxxxxxxxxxxxx"
    projects:
      - path: "group/project-name"

  # Multiple tokens with automatic fallback (recommended)
  - name: "GitLab Production"
    url: "https://gitlab.com"
    tokens:
      - value: "glpat-xxxxxxxxxxxxxxxxxxxxx"
        name: "Primary Token"
        expiresAt: "2025-12-31"  # Optional: helps track expiration
      - value: "glpat-yyyyyyyyyyyyyyyyyyyyy"
        name: "Backup Token"
    groups:
      - path: "my-organization/production-apps"
      - path: "my-organization/all-projects"
        includeSubgroups: true

# Token tips:
# - Use multiple tokens to avoid service interruption on expiry
# - Set expiresAt to get warnings before tokens expire
# - The UI shows health status for each token
