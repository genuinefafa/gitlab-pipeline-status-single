# GitLab Pipeline Status — Docker Compose
#
# Usage:
#   docker compose up -d
#   docker compose logs -f

services:
  gitlab-pipeline-status:
    build: .
    container_name: gitlab-pipeline-status
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - gitlab-cache:/app/.cache
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  gitlab-cache:
